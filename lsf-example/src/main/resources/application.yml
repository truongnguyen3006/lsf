spring:
  application:
    name: lsf-example
  data:
    redis:
      host: localhost
      port: 6379
  profiles:
    default: outbox-mysql

lsf:
  kafka:
    bootstrap-servers: "localhost:9092"
    schema-registry-url: "http://localhost:8081"
    consumer:
      group-id: "lsf-example-group"
      batch: false
      concurrency: 1
      max-poll-records: 50
      retry:
        attempts: 2
        backoff: 1000ms
    dlq:
      enabled: true
      suffix: ".DLQ"
  observability:
    enabled: true
    tracing-enabled: true
  eventing:
    consume-topics:
      - demo-topic
    ignore-unknown-event-type: false
    idempotency:
      enabled: true
      ttl: PT24H
      max-entries: 200000
      cleanup-interval: 1m
      store: auto
      require-redis: false
      redis:
        enabled: true
        key-prefix: "lsf:idemp:"
  quota:
    enabled: true
    store: redis
    key-prefix: "lsf:quota:"
    default-hold-seconds: 30
    keep-alive-seconds: 86400
    allow-release-confirmed: false
#    policies:
#      - key: "uniA:course_section:CT101-2026HK2-NHOM1"
#        limit: 3
#        hold-seconds: 60
#      - key: "uniA:ticket:FLIGHT123-ECONOMY"
#        limit: 2
#        hold-seconds: 120
    provider:
      mode: JDBC
      jdbc:
        table: quota_policy
        enabled-only: true
      cache:
        mode: MEMORY_REDIS
        ttl-seconds: 30
        local-max-size: 10000
        redis-prefix: "lsf:quota:policy:"

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level ${spring.application.name:-app} [%thread] %logger{36} - traceId=%X{traceId:-} spanId=%X{spanId:-} corrId=%X{corrId:-} eventId=%X{eventId:-} eventType=%X{eventType:-} - %msg%n%ex{full}"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans
server:
  error:
    include-message: always
    include-binding-errors: always
  port: 8080

